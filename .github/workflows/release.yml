name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: linux-x64
            archive: tar.gz
          - os: windows-latest
            asset: windows-x64
            archive: zip
          - os: macos-latest
            asset: macos
            archive: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSABTRACE_BUILD_TESTS=ON -DCMAKE_INSTALL_PREFIX=stage

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Install
        run: cmake --install build --config Release

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          asset="SabTrace-${GITHUB_REF_NAME}-${{ matrix.asset }}.tar.gz"
          tar -C stage -czf "$asset" .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $asset = "SabTrace-$env:GITHUB_REF_NAME-${{ matrix.asset }}.zip"
          Compress-Archive -Path stage/* -DestinationPath $asset

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: SabTrace-${{ matrix.asset }}
          path: SabTrace-${{ github.ref_name }}-${{ matrix.asset }}.${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum SabTrace-* > SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --title "SabTrace $GITHUB_REF_NAME"
