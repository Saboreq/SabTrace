name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux · GCC
            os: ubuntu-latest
          - name: Windows · MSVC
            os: windows-latest
          - name: macOS · Clang
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSABTRACE_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: ./build/sabtrace --version

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./build/Release/sabtrace.exe --version
